<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: commonHead('作曲デモ・進捗トラッカー')}"></th:block>
    <style>
        /* インライン編集できるセルであることを示す */
        td.editable { cursor: pointer; }
        td.editable:hover { background-color: #f1f5ff; }
        td.editable.editing { background-color: #fff; }
        .cell-empty { color: #b8bec6; font-style: italic; }
        .inline-toast {
            position: fixed;
            bottom: 1.2rem; right: 1.2rem;
            z-index: 2000;
            min-width: 200px;
            display: none;
        }
        /* 行のドラッグ&ドロップ */
        .drag-cell { width: 34px; text-align: center; }
        .row-handle {
            cursor: grab;
            color: #adb5bd;
            user-select: none;
            font-size: 1.1rem;
        }
        .row-handle:active { cursor: grabbing; }
        tr.dragging { opacity: .45; background-color: #eef4ff; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">🎵 作曲デモ・進捗トラッカー</h1>
        <div class="d-flex gap-2">
            <a th:if="${lastOpenedSong != null}"
               th:href="@{/songs/{id}(id=${lastOpenedSong.id})}"
               class="btn btn-outline-success"
               th:title="'「' + ${lastOpenedSong.title} + '」を開く'">
                🎵 最後に編集した曲に戻る
            </a>
            <a th:href="@{/calendar}" class="btn btn-outline-primary">📅 カレンダー</a>
            <a th:href="@{/songs/new}" class="btn btn-primary">＋ 新規登録</a>
            <span class="vr mx-1"></span>
            <a th:href="@{/profile}" class="btn btn-outline-secondary align-self-center"
               title="プロフィール設定">👤 <span th:text="${currentUsername}">user</span></a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
            </form>
        </div>
    </div>

    <!-- 納期アラート（期限が近い／超過している曲） -->
    <div th:if="${alerts != null and !alerts.isEmpty()}"
         class="alert alert-warning shadow-sm" role="alert">
        <div class="fw-bold mb-2">⚠️ 期限が迫っている曲があります</div>
        <div class="d-flex flex-wrap gap-2">
            <a th:each="a : ${alerts}" th:href="@{/songs/{id}(id=${a.id})}"
               class="badge text-decoration-none p-2"
               th:classappend="${a.overdue} ? 'bg-danger' : 'bg-warning text-dark'">
                <span th:text="${a.title}">曲名</span>
                <span class="opacity-75" th:text="'｜納期 ' + ${a.deadlineRaw}">納期</span>
                <span th:text="${a.overdue ? '（' + (-1 * a.daysUntil) + '日超過）' : (a.daysUntil == 0 ? '（本日締切）' : '（あと' + a.daysUntil + '日）')}">状態</span>
            </a>
        </div>
    </div>

    <!-- 保存・削除後のメッセージ -->
    <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

    <p class="text-muted small">
        💡 曲名・ステータス・タグ・メモのセルをクリックすると、その場で編集できます（自動保存）。
    </p>

    <!-- タグ絞り込み -->
    <div class="mb-4">
        <span class="me-2 fw-bold">タグで絞り込み:</span>
        <a th:href="@{/songs}"
           class="btn btn-sm me-1 mb-1"
           th:classappend="${selectedTagId == null} ? 'btn-dark' : 'btn-outline-dark'">
            すべて
        </a>
        <a th:each="tag : ${tags}"
           th:href="@{/songs(tagId=${tag.id})}"
           class="btn btn-sm me-1 mb-1"
           th:classappend="${selectedTagId != null and selectedTagId == tag.id} ? 'btn-secondary' : 'btn-outline-secondary'"
           th:text="${tag.name}">タグ</a>
    </div>

    <!-- 曲一覧 -->
    <div th:if="${songs.isEmpty()}" class="alert alert-info">
        まだ曲が登録されていません。「＋ 新規登録」から追加してみましょう。
    </div>

    <div class="table-responsive" th:unless="${songs.isEmpty()}">
        <table class="table table-hover align-middle bg-white shadow-sm rounded">
            <thead class="table-light">
            <tr>
                <th scope="col" class="drag-cell"></th>
                <th scope="col">曲名</th>
                <th scope="col">ステータス</th>
                <th scope="col">タグ</th>
                <th scope="col">納期</th>
                <th scope="col">メモ</th>
                <th scope="col" class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="song : ${songs}" th:attr="data-song-id=${song.id}">

                <!-- ドラッグハンドル -->
                <td class="drag-cell">
                    <span class="row-handle" title="ドラッグで並び替え">⠿</span>
                </td>

                <!-- 曲名（インライン編集） -->
                <td class="fw-bold editable" data-field="title"
                    th:attr="data-value=${song.title}">
                    <span class="cell-value" th:text="${song.title}">曲名</span>
                </td>

                <!-- ステータス（インライン編集） -->
                <td class="editable" data-field="status"
                    th:attr="data-value=${song.status.name()}">
                    <span class="cell-value badge"
                          th:classappend="${song.status.colorClass}"
                          th:text="${song.status.label}">ステータス</span>
                </td>

                <!-- タグ（インライン編集：単一選択） -->
                <td class="editable" data-field="tagId"
                    th:attr="data-value=${song.tags.isEmpty()} ? '' : ${song.tags.iterator().next().id}">
                    <span class="cell-value">
                        <th:block th:if="${song.tags.isEmpty()}">
                            <span class="cell-empty">（なし）</span>
                        </th:block>
                        <span th:each="tag : ${song.tags}"
                              class="badge bg-light text-dark border me-1"
                              th:text="${tag.name}">タグ</span>
                    </span>
                </td>

                <!-- 納期（インライン編集） -->
                <td class="editable text-nowrap" data-field="deadline"
                    th:attr="data-value=${song.deadline}">
                    <span class="cell-value small"
                          th:text="${#strings.isEmpty(song.deadline)} ? '（未設定）' : ${song.deadline}"
                          th:classappend="${#strings.isEmpty(song.deadline)} ? 'cell-empty' : ''">納期</span>
                </td>

                <!-- メモ（インライン編集） -->
                <td class="editable" data-field="memo"
                    th:attr="data-value=${song.memo}">
                    <span class="cell-value text-muted small"
                          th:text="${#strings.isEmpty(song.memo)} ? '（クリックして入力）' : ${song.memo}"
                          th:classappend="${#strings.isEmpty(song.memo)} ? 'cell-empty' : ''">メモ</span>
                </td>

                <!-- 操作（スタジオを開く・削除） -->
                <td class="text-end text-nowrap">
                    <a th:href="@{/songs/{id}(id=${song.id})}"
                       class="btn btn-primary fw-bold px-3">🎚️ スタジオを開く</a>
                    <form th:action="@{/songs/{id}/delete(id=${song.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('本当に削除しますか？');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- インライン編集用の select テンプレート（JSが複製して使う） -->
<template id="tpl-status">
    <select class="form-select form-select-sm inline-edit">
        <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}">ステータス</option>
    </select>
</template>
<template id="tpl-tag">
    <select class="form-select form-select-sm inline-edit">
        <option value="">（なし）</option>
        <option th:each="t : ${tags}" th:value="${t.id}" th:text="${t.name}">タグ</option>
    </select>
</template>

<!-- 保存トースト -->
<div class="alert alert-success inline-toast shadow" id="inline-toast" role="alert">保存しました</div>

<script>
    function esc(s) {
        return (s == null ? '' : String(s))
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function showToast(text, ok) {
        const toast = document.getElementById('inline-toast');
        toast.textContent = text;
        toast.className = 'alert inline-toast shadow ' + (ok ? 'alert-success' : 'alert-danger');
        toast.style.display = 'block';
        clearTimeout(toast._t);
        toast._t = setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // 編集後にセルの表示を再描画する
    function renderCell(td, field, data) {
        if (field === 'title') {
            td.dataset.value = data.title;
            td.innerHTML = '<span class="cell-value">' + esc(data.title) + '</span>';
        } else if (field === 'memo') {
            td.dataset.value = data.memo == null ? '' : data.memo;
            if (data.memo) {
                td.innerHTML = '<span class="cell-value text-muted small">' + esc(data.memo) + '</span>';
            } else {
                td.innerHTML = '<span class="cell-value text-muted small cell-empty">（クリックして入力）</span>';
            }
        } else if (field === 'deadline') {
            td.dataset.value = data.deadline == null ? '' : data.deadline;
            if (data.deadline) {
                td.innerHTML = '<span class="cell-value small">' + esc(data.deadline) + '</span>';
            } else {
                td.innerHTML = '<span class="cell-value small cell-empty">（未設定）</span>';
            }
        } else if (field === 'status') {
            td.dataset.value = data.statusName;
            td.innerHTML = '<span class="cell-value badge ' + esc(data.statusColorClass) + '">'
                + esc(data.statusLabel) + '</span>';
        } else if (field === 'tagId') {
            const tags = data.tags || [];
            td.dataset.value = tags.length ? tags[0].id : '';
            if (tags.length) {
                td.innerHTML = '<span class="cell-value">'
                    + tags.map(t => '<span class="badge bg-light text-dark border me-1">'
                        + esc(t.name) + '</span>').join('')
                    + '</span>';
            } else {
                td.innerHTML = '<span class="cell-value"><span class="cell-empty">（なし）</span></span>';
            }
        }
    }

    // 編集モードを開始する
    function startEdit(td) {
        if (td.classList.contains('editing')) return;
        const field = td.dataset.field;
        const currentValue = td.dataset.value || '';
        const originalHTML = td.innerHTML;
        td.classList.add('editing');

        let editor;
        if (field === 'status') {
            editor = document.getElementById('tpl-status').content.firstElementChild.cloneNode(true);
            editor.value = currentValue;
        } else if (field === 'tagId') {
            editor = document.getElementById('tpl-tag').content.firstElementChild.cloneNode(true);
            editor.value = currentValue;
        } else {
            editor = document.createElement('input');
            editor.type = 'text';
            editor.className = 'form-control form-control-sm inline-edit';
            editor.value = currentValue;
        }

        td.innerHTML = '';
        td.appendChild(editor);
        editor.focus();
        if (editor.select) editor.select();

        let done = false;
        const songId = td.closest('tr').dataset.songId;

        function finish(commit) {
            if (done) return;
            done = true;
            td.classList.remove('editing');
            if (!commit) {
                td.innerHTML = originalHTML;
                return;
            }
            save(td, field, songId, editor.value, originalHTML);
        }

        // select は変更で即確定、テキストは Enter / blur で確定
        if (editor.tagName === 'SELECT') {
            editor.addEventListener('change', () => finish(true));
            editor.addEventListener('blur', () => finish(true));
        } else {
            editor.addEventListener('blur', () => finish(true));
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); finish(true); }
                else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
            });
        }
    }

    // Ajaxで1項目を保存する
    function save(td, field, songId, value, originalHTML) {
        fetch('/songs/' + songId + '/field', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ field: field, value: value })
        }).then(res => res.json().then(data => ({ ok: res.ok, data: data })))
          .then(({ ok, data }) => {
              if (!ok) {
                  td.innerHTML = originalHTML;
                  showToast(data.error || '保存に失敗しました', false);
                  return;
              }
              renderCell(td, field, data);
              showToast('保存しました', true);
          }).catch(() => {
              td.innerHTML = originalHTML;
              showToast('通信に失敗しました', false);
          });
    }

    document.querySelectorAll('td.editable').forEach(td => {
        td.addEventListener('click', () => startEdit(td));
    });

    /* ===== 行のドラッグ&ドロップ並び替え ===== */
    let dragRow = null;

    function getRowAfter(tbody, y) {
        const rows = [...tbody.querySelectorAll('tr:not(.dragging)')];
        return rows.reduce((closest, row) => {
            const box = row.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: row };
            }
            return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function saveOrder() {
        const ids = [...document.querySelectorAll('tbody tr')]
            .map(tr => parseInt(tr.dataset.songId, 10));
        if (!ids.length) return;
        fetch('/songs/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ids)
        }).then(res => {
            if (!res.ok) throw new Error('reorder failed');
            return res.json();
        }).then(() => showToast('順序を保存しました', true))
          .catch(() => showToast('順序の保存に失敗しました', false));
    }

    const tbody = document.querySelector('tbody');
    if (tbody) {
        tbody.querySelectorAll('tr').forEach(tr => {
            const handle = tr.querySelector('.row-handle');
            if (!handle) return;
            // ハンドルからのみドラッグ開始（セルのインライン編集を妨げない）
            handle.addEventListener('mousedown', () => tr.setAttribute('draggable', 'true'));
            handle.addEventListener('mouseup', () => tr.removeAttribute('draggable'));
            tr.addEventListener('dragstart', (e) => {
                dragRow = tr;
                tr.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            tr.addEventListener('dragend', () => {
                tr.classList.remove('dragging');
                tr.removeAttribute('draggable');
                dragRow = null;
                saveOrder();
            });
        });
        tbody.addEventListener('dragover', (e) => {
            if (!dragRow) return;
            e.preventDefault();
            const after = getRowAfter(tbody, e.clientY);
            if (after == null) {
                tbody.appendChild(dragRow);
            } else {
                tbody.insertBefore(dragRow, after);
            }
        });
        tbody.addEventListener('drop', (e) => e.preventDefault());
    }
</script>
</body>
</html>
