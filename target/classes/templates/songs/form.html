<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${song.id == null} ? '曲の新規登録' : '曲の編集'">曲の登録</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0" th:text="${song.id == null} ? '🎵 曲の新規登録' : '✏️ 曲の編集'">曲の登録</h1>
        <a th:href="@{/songs}" class="btn btn-outline-secondary">← 一覧に戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/songs/save}" th:object="${song}" method="post">

                <!-- 編集時に id を保持 -->
                <input type="hidden" th:field="*{id}">

                <!-- 曲名 -->
                <div class="mb-3">
                    <label for="title" class="form-label">曲名 <span class="text-danger">*</span></label>
                    <input type="text" id="title" class="form-control"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">エラー</div>
                </div>

                <!-- ステータス -->
                <div class="mb-3">
                    <label for="status" class="form-label">ステータス <span class="text-danger">*</span></label>
                    <select id="status" class="form-select" th:field="*{status}">
                        <option th:each="st : ${statuses}"
                                th:value="${st}"
                                th:text="${st.label}">ステータス</option>
                    </select>
                </div>

                <!-- タグ -->
                <div class="mb-3">
                    <label class="form-label">タグ</label>
                    <div>
                        <div class="form-check form-check-inline" th:each="tag : ${allTags}">
                            <input class="form-check-input" type="checkbox" name="tagIds"
                                   th:id="${'tag-' + tag.id}"
                                   th:value="${tag.id}"
                                   th:checked="${selectedTagIds.contains(tag.id)}">
                            <label class="form-check-label" th:for="${'tag-' + tag.id}" th:text="${tag.name}">タグ</label>
                        </div>
                    </div>
                </div>

                <!-- メモ -->
                <div class="mb-3">
                    <label for="memo" class="form-label">メモ</label>
                    <textarea id="memo" class="form-control" rows="3" th:field="*{memo}"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/songs}" class="btn btn-outline-secondary">キャンセル</a>
                    <button type="submit" class="btn btn-primary">保存する</button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
