<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール設定 - 作曲トラッカー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 680px;">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="h3 mb-0">⚙️ プロフィール設定</h1>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/songs}" class="btn btn-outline-secondary">← ダッシュボード</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
            </form>
        </div>
    </div>

    <!-- 更新成功メッセージ -->
    <div th:if="${message}" class="alert alert-success py-2" role="alert" th:text="${message}"></div>

    <!-- アカウント概要 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold py-2">👤 アカウント</div>
        <div class="card-body">
            <dl class="row mb-0 small">
                <dt class="col-4 col-sm-3 text-muted">ユーザー名</dt>
                <dd class="col-8 col-sm-9" th:text="${user.username}">name</dd>
                <dt class="col-4 col-sm-3 text-muted">メール</dt>
                <dd class="col-8 col-sm-9" th:text="${user.email}">mail</dd>
                <dt class="col-4 col-sm-3 text-muted">ロール</dt>
                <dd class="col-8 col-sm-9" th:text="${user.role}">role</dd>
            </dl>
        </div>
    </div>

    <!-- 基本情報の変更 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold py-2">✏️ 基本情報の変更</div>
        <div class="card-body">
            <form th:action="@{/profile/update}" th:object="${profileForm}" method="post">
                <!-- 重複などの全体エラー（th:object スコープ内に置く） -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2" role="alert">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}">エラー</div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">ユーザー名 <span class="text-danger">*</span></label>
                    <input type="text" id="username" class="form-control" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">エラー</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">メールアドレス <span class="text-danger">*</span></label>
                    <input type="email" id="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">エラー</div>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">基本情報を更新</button>
                </div>
            </form>
        </div>
    </div>

    <!-- パスワードの変更 -->
    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold py-2">🔑 パスワードの変更</div>
        <div class="card-body">
            <form th:action="@{/profile/password}" th:object="${passwordForm}" method="post">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2" role="alert">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}">エラー</div>
                </div>

                <div class="mb-3">
                    <label for="currentPassword" class="form-label">現在のパスワード <span class="text-danger">*</span></label>
                    <input type="password" id="currentPassword" class="form-control" th:field="*{currentPassword}"
                           th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}">エラー</div>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">新しいパスワード <span class="text-danger">*</span></label>
                    <input type="password" id="newPassword" class="form-control" th:field="*{newPassword}"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">エラー</div>
                    <div class="form-text">6文字以上</div>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">新しいパスワード（確認） <span class="text-danger">*</span></label>
                    <input type="password" id="confirmPassword" class="form-control" th:field="*{confirmPassword}"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">エラー</div>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">パスワードを変更</button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
