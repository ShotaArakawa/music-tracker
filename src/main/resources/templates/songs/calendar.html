<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作スケジュール・カレンダー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f5f7; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-head {
            text-align: center; font-weight: 700; color: #6c757d;
            font-size: .82rem; padding: .3rem 0;
        }
        .cal-head.sun { color: #dc3545; }
        .cal-head.sat { color: #0d6efd; }
        .cal-cell {
            min-height: 100px;
            border: 1px solid #e3e6ea; border-radius: .5rem;
            background: #fff; padding: .3rem .35rem;
            display: flex; flex-direction: column; gap: .1rem;
            overflow: hidden;
        }
        .cal-cell.other { background: #f7f8fa; }
        .cal-cell.other .cal-daynum { color: #c3cad3; }
        .cal-cell.today { border-color: #0d6efd; box-shadow: inset 0 0 0 2px #0d6efd; }
        .cal-daynum { font-size: .8rem; font-weight: 700; color: #495057; }
        .cal-cell.sun .cal-daynum { color: #dc3545; }
        .cal-cell.sat .cal-daynum { color: #0d6efd; }
        .cal-ev {
            display: block; font-size: .72rem; line-height: 1.3;
            border-radius: .35rem; padding: .08rem .35rem; margin-top: .12rem;
            text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .cal-ev.normal { background: #e7f1ff; color: #084298; }
        .cal-ev.soon { background: #fff3cd; color: #664d03; }
        .cal-ev.over { background: #f8d7da; color: #842029; }
        .cal-ev:hover { filter: brightness(.95); }

        @media (max-width: 575.98px) {
            .cal-cell { min-height: 72px; }
            .cal-ev { font-size: .64rem; }
        }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="h3 mb-0">📅 制作スケジュール</h1>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/profile}" class="btn btn-outline-secondary"
               title="プロフィール設定">👤 <span th:text="${currentUsername}">user</span></a>
            <a th:href="@{/songs}" class="btn btn-outline-secondary">← ダッシュボードに戻る</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <!-- 月送りナビ -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <button type="button" id="prev" class="btn btn-outline-primary btn-sm">◀ 前の月</button>
                <h2 class="h5 mb-0" id="cal-title">　</h2>
                <div class="d-flex gap-2">
                    <button type="button" id="today" class="btn btn-outline-secondary btn-sm">今日</button>
                    <button type="button" id="next" class="btn btn-outline-primary btn-sm">次の月 ▶</button>
                </div>
            </div>

            <!-- 曜日見出し -->
            <div class="cal-grid mb-1">
                <div class="cal-head sun">日</div>
                <div class="cal-head">月</div>
                <div class="cal-head">火</div>
                <div class="cal-head">水</div>
                <div class="cal-head">木</div>
                <div class="cal-head">金</div>
                <div class="cal-head sat">土</div>
            </div>

            <!-- 日付グリッド（JSが描画） -->
            <div class="cal-grid" id="cal-body"></div>

            <div class="d-flex gap-3 mt-3 small text-muted flex-wrap">
                <span><span class="badge bg-danger">　</span> 納期超過</span>
                <span><span class="badge bg-warning text-dark">　</span> 3日以内</span>
                <span><span class="badge" style="background:#e7f1ff;color:#084298;">　</span> 予定</span>
            </div>
            <p id="cal-empty" class="text-muted small mt-3 mb-0" style="display:none;">
                納期が設定された曲はまだありません。一覧画面で各曲の「納期」を入力すると、ここに表示されます。
            </p>
        </div>
    </div>
</div>

<script>
    let viewYear, viewMonth; // month は 0 始まり
    let eventsByDate = {};
    let totalEvents = 0;

    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function dateKey(y, m0, d) { return y + '-' + pad(m0 + 1) + '-' + pad(d); }

    function esc(s) {
        return (s == null ? '' : String(s))
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function todayKey() {
        const t = new Date();
        return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
    }

    function classFor(ev) {
        if (ev.overdue) return 'over';
        if (ev.daysUntil != null && ev.daysUntil <= 3) return 'soon';
        return 'normal';
    }

    function render() {
        document.getElementById('cal-title').textContent = viewYear + '年 ' + (viewMonth + 1) + '月';
        const body = document.getElementById('cal-body');
        body.innerHTML = '';

        const first = new Date(viewYear, viewMonth, 1);
        const startDow = first.getDay();               // 0=日
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const tKey = todayKey();

        // 前月の余白 + 当月 + 翌月の余白 を 42 マス（6週）で描画
        const cells = [];
        for (let i = 0; i < startDow; i++) {
            const d = new Date(viewYear, viewMonth, 1 - (startDow - i));
            cells.push({ date: d, other: true });
        }
        for (let d = 1; d <= daysInMonth; d++) {
            cells.push({ date: new Date(viewYear, viewMonth, d), other: false });
        }
        while (cells.length % 7 !== 0 || cells.length < 42) {
            const last = cells[cells.length - 1].date;
            const d = new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1);
            cells.push({ date: d, other: true });
            if (cells.length >= 42) break;
        }

        cells.forEach((cell) => {
            const y = cell.date.getFullYear(), m0 = cell.date.getMonth(), day = cell.date.getDate();
            const key = dateKey(y, m0, day);
            const dow = cell.date.getDay();

            const div = document.createElement('div');
            div.className = 'cal-cell'
                + (cell.other ? ' other' : '')
                + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '')
                + (key === tKey ? ' today' : '');

            const num = document.createElement('div');
            num.className = 'cal-daynum';
            num.textContent = day;
            div.appendChild(num);

            (eventsByDate[key] || []).forEach((ev) => {
                const a = document.createElement('a');
                a.className = 'cal-ev ' + classFor(ev);
                a.href = '/songs/' + ev.songId;
                a.title = ev.title + '（納期: ' + ev.raw + '）';
                a.innerHTML = '🎵 ' + esc(ev.title);
                div.appendChild(a);
            });

            body.appendChild(div);
        });
    }

    function load() {
        fetch('/api/calendar/events')
            .then((res) => res.json())
            .then((list) => {
                eventsByDate = {};
                totalEvents = list.length;
                list.forEach((ev) => {
                    (eventsByDate[ev.date] = eventsByDate[ev.date] || []).push(ev);
                });
                document.getElementById('cal-empty').style.display = totalEvents ? 'none' : 'block';
                const now = new Date();
                viewYear = now.getFullYear();
                viewMonth = now.getMonth();
                render();
            })
            .catch(() => {
                document.getElementById('cal-title').textContent = '読み込みに失敗しました';
            });
    }

    document.getElementById('prev').addEventListener('click', () => {
        viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
    });
    document.getElementById('next').addEventListener('click', () => {
        viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
    });
    document.getElementById('today').addEventListener('click', () => {
        const now = new Date(); viewYear = now.getFullYear(); viewMonth = now.getMonth(); render();
    });

    load();
</script>
</body>
</html>
