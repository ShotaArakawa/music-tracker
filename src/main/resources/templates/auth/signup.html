<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headContent('新規登録 - 作曲トラッカー')}"></head>
<body class="bg-light">
<div class="container" style="max-width: 460px;">
    <div class="text-center my-4">
        <h1 class="h3">🎵 作曲トラッカー</h1>
        <p class="text-muted">新規ユーザー登録</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/signup}" th:object="${signupForm}" method="post">

                <!-- 全体エラー（重複など）。th:object スコープ内に置く必要がある -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2" role="alert">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}">エラー</div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">ユーザー名 <span class="text-danger">*</span></label>
                    <input type="text" id="username" class="form-control" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">エラー</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">メールアドレス <span class="text-danger">*</span></label>
                    <input type="email" id="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">エラー</div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">パスワード <span class="text-danger">*</span></label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">エラー</div>
                    <div class="form-text">6文字以上</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">登録する</button>
            </form>
        </div>
    </div>

    <p class="text-center mt-3">
        すでにアカウントをお持ちですか？
        <a th:href="@{/login}">ログイン</a>
    </p>
</div>
</body>
</html>
