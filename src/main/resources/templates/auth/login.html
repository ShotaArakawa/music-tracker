<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headContent('ログイン - 作曲トラッカー')}"></head>
<body class="bg-light">
<div class="container" style="max-width: 420px;">
    <div class="text-center my-4">
        <h1 class="h3">🎵 作曲トラッカー</h1>
        <p class="text-muted">ログイン</p>
    </div>

    <div th:if="${message}" class="alert alert-success py-2" role="alert" th:text="${message}"></div>
    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
        ユーザー名またはパスワードが正しくありません。
    </div>
    <div th:if="${param.logout}" class="alert alert-info py-2" role="alert">
        ログアウトしました。
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">ユーザー名</label>
                    <input type="text" id="username" name="username" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">パスワード</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input">
                    <label for="remember-me" class="form-check-label">ログイン状態を保持する</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">ログイン</button>
            </form>
        </div>
    </div>

    <p class="text-center mt-3">
        アカウントをお持ちでないですか？
        <a th:href="@{/signup}">新規登録</a>
    </p>
</div>
</body>
</html>
