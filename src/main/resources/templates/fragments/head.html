<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<!--
    共通 <head> フラグメント

    使い方は2通り:
    1) headContent(title)
       追加の <style> を持たないページ用。<head> ごと差し替える。
       例: <head th:replace="~{fragments/head :: headContent('画面タイトル')}"></head>

    2) commonHead(title)
       ページ独自の <style> を持つページ用。自分の <head> の中に共通部分だけを挿入する。
       例:
         <head>
             <th:block th:replace="~{fragments/head :: commonHead('画面タイトル')}"></th:block>
             <style> ... ページ固有のCSS ... </style>
         </head>

    headContent は内部で commonHead を呼び出しているため、共通タグの定義は1か所だけ。
-->
<head th:fragment="headContent(title)">
    <th:block th:replace="~{fragments/head :: commonHead(${title})}"></th:block>
</head>

<body>
<th:block th:fragment="commonHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">作曲トラッカー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PWA設定: manifest.json の読み込み と Service Worker の登録 -->
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>

    <!-- Web用アイコン (Favicon) -->
    <link rel="icon" href="/icon.png" type="image/png">
</th:block>
</body>
</html>
